<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Revenue Management Pricing Tool</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        h1 {
            grid-column: 1 / -1;
            margin-top: 0;
            font-size: 1.75rem;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        pre {
            background: #0f172a;
            color: #38bdf8;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-family: "Fira Code", Consolas, Monaco, monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            margin: 0;
            min-height: 300px;
        }

        .btn-copy {
            background: #475569;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-copy:hover { background: #334155; }
    </style>
</head>
<body>

<h1>Dynamic Revenue Management Pricing Tool</h1>

<div class="container">
    <!-- Config Card -->
    <div class="card">
        <h2>Input Parameters</h2>
        <div class="form-group">
            <label for="route">Route Name</label>
            <input type="text" id="route" value="Hyderabad to Tirupathi" placeholder="e.g., Hyderabad to Tirupathi">
        </div>

        <div class="grid-inputs">
            <div class="form-group">
                <label for="categories">No of categories</label>
                <select id="categories">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8" selected>8</option>
                </select>
            </div>
            <div class="form-group">
                <label for="minFare">Minimum Fare Floor</label>
                <input type="number" id="minFare" value="809">
            </div>
        </div>

        <h3>Day-of-Week ASPs</h3>
        <div class="grid-inputs">
            <div class="form-group"><label>Monday</label><input type="number" id="mon" value="1100"></div>
            <div class="form-group"><label>Tuesday</label><input type="number" id="tue" value="1054"></div>
            <div class="form-group"><label>Wednesday</label><input type="number" id="wed" value="1078"></div>
            <div class="form-group"><label>Thursday</label><input type="number" id="thu" value="1103"></div>
            <div class="form-group"><label>Friday</label><input type="number" id="fri" value="1475"></div>
            <div class="form-group"><label>Saturday</label><input type="number" id="sat" value="1113"></div>
            <div class="form-group"><label>Sunday</label><input type="number" id="sun" value="1139"></div>
        </div>

        <button onclick="generateFares()">Generate Pricing Ladders</button>
    </div>

    <!-- Output Card -->
    <div class="card" style="display: flex; flex-direction: column;">
        <div class="output-header">
            <h2>Generated Output</h2>
            <button class="btn-copy" onclick="copyOutput()">Copy Text</button>
        </div>
        <pre id="outputCode">Click "Generate Pricing Ladders" to process your settings...</pre>
    </div>
</div>

<script>
function generateFares() {
    const route = document.getElementById('route').value;
    const numCategories = parseInt(document.getElementById('categories').value);
    const minFare = parseInt(document.getElementById('minFare').value);
    
    const days = [
        { name: 'Monday', id: 'mon' },
        { name: 'Tuesday', id: 'tue' },
        { name: 'Wednesday', id: 'wed' },
        { name: 'Thursday', id: 'thu' },
        { name: 'Friday', id: 'fri' },
        { name: 'Saturday', id: 'sat' },
        { name: 'Sunday', id: 'sun' }
    ];

    let output = `### ${route}\n`;

    days.forEach(day => {
        const asp = parseInt(document.getElementById(day.id).value) || 0;
        
        // Calculate standard anchor point near ASP ending in 09 or 59
        let anchor = Math.round(asp / 50) * 50 - 1;
        if (anchor % 100 !== 9 && anchor % 100 !== 59) {
            anchor = Math.round((anchor - 9) / 50) * 50 + 9;
        }

        let fares = [];
        // Anchor middle tier mapping logic based on total selected categories
        let middleIndex = numCategories >= 8 ? 3 : Math.floor(numCategories / 2);

        for (let i = 0; i < numCategories; i++) {
            let fare;
            let stepDiff = i - middleIndex;
            
            // Clean interval delta spacing setup around base
            switch(stepDiff) {
                case -3: fare = anchor - 300; break;
                case -2: fare = anchor - 200; break;
                case -1: fare = anchor - 100; break;
                case 0:  fare = anchor; break;
                case 1:  fare = anchor + 100; break;
                case 2:  fare = anchor + 250; break; 
                case 3:  fare = anchor + 350; break;
                case 4:  fare = anchor + 450; break;
                default: fare = anchor + (stepDiff * 100);
            }

            // Floor check protection layer
            if (fare < minFare) fare = minFare;
            fares.push(fare);
        }

        // Output formatting from Highest down to Lowest
        fares.reverse();
        const formattedFares = fares.join('/');

        output += `* **${day.name}** ASP: ${asp.toLocaleString('en-IN')}  \n  Recommended fares: ${formattedFares}\n`;
    });

    document.getElementById('outputCode').innerText = output;
}

function copyOutput() {
    const outputText = document.getElementById('outputCode').innerText;
    navigator.clipboard.writeText(outputText);
    alert('Copied output text to clipboard!');
}
</script>

</body>
</html>
